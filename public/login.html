<!DOCTYPE html>
<html>
<body>
<h2>Login</h2>
<form id="loginForm">
  Email: <input name="email" type="email" required><br>
  Password: <input name="password" type="password" required><br>
  <button>Login</button>
</form>
<script>
const form=document.getElementById('loginForm');
form.addEventListener('submit', async e=>{
  e.preventDefault();
  const data=Object.fromEntries(new FormData(form));
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  const json=await res.json();
  localStorage.setItem('access',json.accessToken);
  localStorage.setItem('refresh',json.refreshToken);
  alert('Logged in: '+json.user.role);
});
</script>
</body>
</html>
